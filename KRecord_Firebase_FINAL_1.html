<script>
const firebaseConfig = {
  apiKey:            "PEGA_TU_API_KEY_AQUI",
  authDomain:        "PEGA_TU_AUTH_DOMAIN_AQUI",
  projectId:         "PEGA_TU_PROJECT_ID_AQUI",
  storageBucket:     "PEGA_TU_STORAGE_BUCKET_AQUI",
  messagingSenderId: "PEGA_TU_MESSAGING_SENDER_ID_AQUI",

};
// ▲▲▲  FIN DE CONFIGURACIÓN  ▲▲▲

// ── Inicializar Firebase ──────────────────────────────────────────────
firebase.initializeApp(firebaseConfig);
const db   = firebase.firestore();
const auth = firebase.auth();

// Colección del proyecto
const PROJECT_ID = "krecord_kamanchacos";
const docRef = (key) => db.collection("krecord").doc(key);

// ── Funciones de Storage con Firestore ───────────────────────────────
const Store = {
  async get(key) {
    try {
      const snap = await docRef(key).get();
      return snap.exists ? snap.data().value : null;
    } catch(e) { return null; }
  },
  set(key, val) {
    docRef(key).set({ value: val, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
      .catch(e => console.warn("Store.set error:", e));
  },
  listen(key, cb) {
    return docRef(key).onSnapshot(snap => {
      if (snap.exists) cb(snap.data().value);
    });
  }
};
</script>

// ── TOAST ─────────────────────────────────────────────────────────────
let toastT;
function toast(msg) {
  clearTimeout(toastT);
  S.toast=msg; render();
  toastT=setTimeout(()=>{S.toast=null;render();},2400);
}

// ── FIREBASE REALTIME LISTENERS ───────────────────────────────────────
const unsubs = [];
function startListeners() {
  // Listen to all 3 keys in real-time
  unsubs.push(Store.listen("kr_progress", val => {
    if(JSON.stringify(val)!==JSON.stringify(S.progress)){
      S.progress=val||{}; render();
    }
  }));
  unsubs.push(Store.listen("kr_budget", val => {
    if(JSON.stringify(val)!==JSON.stringify(S.budget)){
      S.budget=val||{}; render();
    }
  }));
  unsubs.push(Store.listen("kr_updates", val => {
    S.updates=val||[]; render();
  }));

  // Monitor connection state
  db.enableNetwork().then(()=> {S.online=true; render();});
  const connRef = firebase.database ? null : null;
}

// ── INIT ──────────────────────────────────────────────────────────────
async function init() {
  const bar = document.getElementById("splash_bar");
  const msg = document.getElementById("splash_msg");

  // Splash progress
  bar.style.width="20%"; msg.textContent="AUTENTICANDO...";

  try {
    // Sign in anonymously
    await auth.signInAnonymously();
    bar.style.width="50%"; msg.textContent="CARGANDO DATOS...";

    // Load initial data
    const [prog, bud, upds] = await Promise.all([
      Store.get("kr_progress"),
      Store.get("kr_budget"),
      Store.get("kr_updates"),
    ]);
    S.progress = prog || {};
    S.budget   = bud  || {};
    S.updates  = upds || [];
    S.online   = true;

    bar.style.width="90%"; msg.textContent="INICIANDO DASHBOARD...";
    await new Promise(r=>setTimeout(r,300));

    // Start real-time sync
    startListeners();

    bar.style.width="100%";
    await new Promise(r=>setTimeout(r,200));

    document.getElementById("splash").classList.add("hidden");
    render();

  } catch(err) {
    console.error("Firebase init error:", err);
    msg.textContent="ERROR: "+err.message;
    msg.style.color="#ef4444";
    bar.style.background="#ef4444";
    bar.style.width="100%";
    // Fallback a localStorage
    S.progress = JSON.parse(localStorage.getItem("kr_progress")||"{}");
    S.budget   = JSON.parse(localStorage.getItem("kr_budget")||"{}");
    S.updates  = JSON.parse(localStorage.getItem("kr_updates")||"[]");
    S.online   = false;
    setTimeout(()=>{
      document.getElementById("splash").classList.add("hidden");
      render();
    },1500);
  }
}

// ── SAVE ──────────────────────────────────────────────────────────────
function save(key, val) {
  Store.set(key, val);
  localStorage.setItem(key, JSON.stringify(val)); // backup local
  S.lastSaved = new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"});

}

          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">
              <div>
                <div style="font-size:12px;font-weight:bold;color:${st.done?"#475569":"#e2e8f0"};text-decoration:${st.done?"line-through":"none"}">${step.lb}</div>
                <div style="font-size:10px;color:#475569;margin-top:3px;line-height:1.5">${step.det}</div>
                ${st.done?`<div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap">${badge(ph.color,"✓ "+st.doneAt)} ${st.by?badge("#334155","#"+st.by):""}</div>`:""}
              </div>
              <button data-step="${step.id}" style="${CSS.btn};background:${st.done?"#1e293b":ph.color};color:${st.done?ph.color:"#0a0d14"};font-size:10px;padding:4px 10px;flex-shrink:0">${st.done?"↩ DESHACER":"✓ COMPLETAR"}</button>
            </div>
            ${!st.done?`<div style="margin-top:8px">
              <div style="display:flex;justify-content:space-between;font-size:9px;color:#64748b;margin-bottom:2px"><span>Avance parcial</span><span style="color:${ph.color}">${st.pct||0}%</span></div>
              <input type="range" data-pct="${step.id}" min="0" max="100" value="${st.pct||0}" style="accent-color:${ph.color}">
            </div>`:""}
            <div style="margin-top:6px">
              ${!en?`<div style="display:flex;gap:6px;align-items:center">
                ${st.note?`<div style="font-size:10px;color:#64748b;font-style:italic">📝 ${st.note}</div>`:""}
                <button data-note-open="${step.id}" style="${CSS.btn};font-size:9px;padding:2px 7px">📝 NOTA</button>
              </div>`:`<div style="display:flex;gap:6px">
                <input id="note_${step.id}" value="${(st.note||"").replace(/"/g,"&quot;")}" placeholder="Nota técnica..." style="${CSS.inp};font-size:11px">
                <button data-note-save="${step.id}" style="${CSS.btnP}">GUARDAR</button>
                <button data-note-close="${step.id}" style="${CSS.btn}">✕</button>
              </div>`}
            </div>
          </div>
        </div>
      </div>`;
    });
  }

  // ── PRESUPUESTO ──
  if(S.tab==="presupuesto"){
    const k2=kpi();
    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:14px">`;
    [{v:"$24.000.000",l:"TOTAL MINCAP",c:"#f59e0b"},{v:"$1.172.336",l:"COFINANC. 4,88%",c:"#10b981"},{v:"$25.172.336",l:"COSTO TOTAL",c:"#a855f7"},{v:fmtCLP(k2.spent),l:`EJECUTADO ${k2.budpct}%`,c:"#ef4444"}].forEach(ki=>{
      h+=`<div style="${CSS.card}"><div style="color:${ki.c};font-size:15px;font-weight:bold">${ki.v}</div><div style="color:#64748b;font-size:9px;letter-spacing:1px">${ki.l}</div></div>`;
    });
    h+=`</div>`;
    h+=`<div style="${CSS.card}"><div style="${CSS.cardH}">EJECUCIÓN PRESUPUESTARIA — ACTUALIZA LOS MONTOS GASTADOS</div>`;
    BUDGET_CATS.forEach(cat=>{
      const spent=S.budget[cat.id]||0;
      const pct=Math.min(100,Math.round((spent/cat.total)*100));
      h+=`<div style="margin-bottom:18px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <div style="color:${cat.color};font-weight:bold;font-size:11px">${cat.name}</div>
          <div style="text-align:right"><div style="font-size:11px">${fmtCLP(cat.total)}</div><div style="color:${cat.color};font-size:10px">${pct}% ejecutado</div></div>
        </div>
        <div style="display:flex;gap:7px;align-items:center;margin-bottom:5px">
          <input type="number" data-bud="${cat.id}" value="${spent||""}" placeholder="Monto ejecutado $" style="${CSS.inp};width:160px;flex-shrink:0">
          <span style="color:#475569;font-size:10px">de ${fmtCLP(cat.total)}</span>
        </div>
        <div style="${CSS.bar}"><div style="${fill(pct,cat.color)}"></div></div>
      </div>`;
    });
    h+=`</div>`;
    h+=`<div style="${CSS.card}"><div style="${CSS.cardH}">MATERIALES POR FASE</div>`;
    [{l:"FASE 1",a:1551950,c:"#ef4444"},{l:"FASE 1C",a:421600,c:"#f97316"},{l:"FASE 2 — Pukará",a:556170,c:"#10b981"},{l:"FASE 3 — Médano",a:598460,c:"#06b6d4"}].forEach(f=>{
      h+=`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e293b">
        <div style="color:${f.c};font-size:10px;font-weight:bold">${f.l}</div>
        <div style="font-weight:bold">${fmtCLP(f.a)}</div>
      </div>`;
    });
    h+=`<div style="display:flex;justify-content:space-between;padding:10px 0 0;border-top:2px solid #f59e0b44">
      <div style="color:#f59e0b;font-weight:bold;font-size:11px">TOTAL MATERIALES</div>
      <div style="color:#f59e0b;font-size:16px;font-weight:bold">$3.128.180</div>
    </div></div>`;
  }

  // ── RENDICIÓN ──
  if(S.tab==="rendicion"){
    h+=`<div style="${CSS.card}"><div style="${CSS.cardH}">CÓMO RENDIR — FONDO DE LA MÚSICA MINCAP · FOLIO 811246</div>`;
    [{i:"👤",t:"Contratos Honorarios",d:"Productor Musical (Jorge Flores), Ingeniero Sonido (Milenko Fernández), Gestora Cultural (Yocelyn Bugueño). Cada contrato: RUT, rol, honorario, período, actividades. Firmar ambas partes."},
     {i:"🧾",t:"Boletas / Facturas",d:"Toda compra con factura a nombre de la organización (RUT 77780262-3). Conservar originales. Pedir siempre factura."},
     {i:"💳",t:"Comprobantes de Pago",d:"Transferencia o cheque por cada factura. El monto debe coincidir exactamente. Mantener cartola bancaria."},
     {i:"📸",t:"Informe de Avance + Fotos",d:"Por cada actividad: descripción, fechas, personas, resultados. Fotos antes/durante/después de cada fase constructiva."},
     {i:"📊",t:"Planilla de Rendición MINCAP",d:"N° correlativo, fecha, concepto, proveedor, N° documento, monto, saldo. Cada ítem con su respaldo físico adjunto."},
     {i:"📋",t:"Registro de Asistencia",d:"Para talleres: lista firmada. Para convocatoria: evidencia de difusión (capturas redes, impresos)."},
    ].forEach(r=>{
      h+=`<div style="border-left:3px solid #f59e0b44;padding-left:12px;margin-bottom:14px">
        <div style="display:flex;gap:7px;align-items:center;margin-bottom:4px"><span style="font-size:16px">${r.i}</span><span style="color:#f59e0b;font-weight:bold;font-size:10px;letter-spacing:1px">${r.t.toUpperCase()}</span></div>
        <div style="color:#94a3b8;font-size:11px;line-height:1.6">${r.d}</div>
      </div>`;
    });
    h+=`</div><div style="${CSS.card}"><div style="${CSS.cardH}">CALENDARIO DE RENDICIÓN</div>`;
    [{h:"1er Informe de Avance",f:"Jul 2026",c:"#f59e0b",d:"Al completar FASE 1 y 1C. Fotos, facturas materiales, contratos."},
     {h:"2do Informe de Avance",f:"Ago 2026",c:"#f97316",d:"Al completar FASE 2 y 3 + equipos instalados."},
     {h:"Informe Convocatoria",f:"Sep 2026",c:"#10b981",d:"Evidencia difusión, actas selección, lista artistas ganadores."},
     {h:"Informe Talleres + Grabaciones",f:"Nov 2026",c:"#a855f7",d:"Lista asistencia talleres, registros audiovisuales grabaciones."},
     {h:"RENDICIÓN FINAL",f:"Dic 2026",c:"#ef4444",d:"Planilla completa MINCAP con TODOS los ítems. Originales. Informe final."},
    ].forEach(ri=>{
      h+=`<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #1e293b">
        ${badge(ri.c,ri.f)}
        <div><div style="color:#e2e8f0;font-weight:bold;font-size:11px">${ri.h}</div><div style="color:#64748b;font-size:10px;margin-top:2px">${ri.d}</div></div>
      </div>`;
    });
    h+=`</div>`;
  }

  // ── GUÍA ──
  if(S.tab==="guia"){
    h+=`<div style="${CSS.card}"><div style="${CSS.cardH}">📡 ARQUITECTURA — FIREBASE + MULTI-USUARIO</div>
      <div style="color:#94a3b8;font-size:12px;line-height:1.8;margin-bottom:10px">
        Esta app usa <span style="color:#f59e0b">Firebase Firestore</span> para sincronizar datos en tiempo real. Cualquier usuario con el link puede ver y registrar avances — todos ven los cambios al instante, sin recargar la página.
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px">
        ${[
          ["🔥","Firebase Hosting","Sirve el HTML estático al mundo (URL pública, SSL incluido, CDN global)"],
          ["🗄️","Firestore Database","Base de datos NoSQL en tiempo real. Datos compartidos entre todos los usuarios"],
          ["🔐","Anonymous Auth","Cada usuario se autentica anónimamente — no requiere login pero los datos son trazables"],
          ["🌐","CDN Google","Firebase SDK cargado desde CDN de Google — sin instalaciones"],
        ].map(([ico,nom,det])=>`<div style="background:#070b12;border:1px solid #1e293b;border-radius:6px;padding:12px">
          <div style="font-size:20px;margin-bottom:6px">${ico}</div>
          <div style="color:#f59e0b;font-size:10px;font-weight:bold;margin-bottom:4px">${nom}</div>
          <div style="color:#64748b;font-size:9px;line-height:1.5">${det}</div>
        </div>`).join("")}
      </div>
    </div>`;

    h+=`<div style="${CSS.card}"><div style="${CSS.cardH}">🔧 CÓMO AGREGAR NUEVAS FUNCIONES (PARA DESARROLLADORES)</div>`;
    [{n:"01",t:"Agregar un nuevo campo al registro de avances",c:"#f59e0b",s:[
      "En el HTML busca el array de opciones del select id=upd_sel",
      "Agrega: &lt;option value=\"foto\"&gt;📷 Foto&lt;/option&gt;",
      "En la función addUpdate(), el tipo se guarda automáticamente",
      "Todos los usuarios verán el nuevo tipo en tiempo real",
    ]},
    {n:"02",t:"Agregar una nueva fase constructiva",c:"#ef4444",s:[
      "En el array PHASES agrega un nuevo objeto con: id, name, color, budget, desc, steps[]",
      "Cada step necesita: id (único), lb (label), det (detalle técnico)",
      "El sistema de checkboxes y porcentajes funciona automáticamente",
      "Firestore guarda el estado de cada paso con su id único",
    ]},
    {n:"03",t:"Conectar Google Sheets para reportes",c:"#10b981",s:[
      "En Firebase Console activa la extensión Export Collections to BigQuery",
      "O usa Google Apps Script: lee Firestore con la API REST de Firebase",
      "URL: https://firestore.googleapis.com/v1/projects/TU_PROJECT/databases/(default)/documents/krecord/kr_progress",
      "Autenticar con un Service Account generado en Firebase Console → IAM",
    ]},
    {n:"04",t:"Agregar notificaciones por email/WhatsApp",c:"#a855f7",s:[
      "En Firebase Console activa Firebase Cloud Functions",
      "Crea una función que escuche cambios en Firestore: onDocumentUpdated",
      "Conecta con SendGrid (email) o Twilio (WhatsApp) para enviar alertas",
      "Ejemplo: notificar cuando el avance de obra supere un 50%",
    ]},
    {n:"05",t:"Subir fotos de obra al dashboard",c:"#06b6d4",s:[
      "En Firebase Console activa Firebase Storage",
      "Agrega en el HTML: &lt;script src=firebase-storage-compat.js&gt; desde CDN",
      "Usa storage.ref().put(file) para subir fotos desde el celular",
      "Las URLs de las fotos se guardan en Firestore junto al paso correspondiente",
    ]},
    ].forEach(s=>{
      h+=`<div style="border-left:3px solid ${s.c}44;padding-left:14px;margin-bottom:16px">
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px">
          <div style="background:${s.c};color:#0a0d14;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;flex-shrink:0">${s.n}</div>
          <div style="color:${s.c};font-weight:bold;font-size:11px;letter-spacing:1px">${s.t.toUpperCase()}</div>
        </div>`;
      s.s.forEach(st=>{ h+=`<div style="display:flex;gap:6px;margin-bottom:4px"><span style="color:${s.c};font-size:9px;flex-shrink:0">→</span><span style="font-size:10px;color:#94a3b8;line-height:1.5">${st}</span></div>`; });
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  h+=`</div>`;
  if(S.toast) h+=`<div class="toast">${S.toast}</div>`;
  return h;
}

// ── BIND EVENTS ───────────────────────────────────────────────────────
function bindEvents(){
  document.querySelectorAll("[data-tab]").forEach(el=>el.addEventListener("click",()=>{S.tab=el.dataset.tab;render();}));
  document.querySelectorAll("[data-phase]").forEach(el=>el.addEventListener("click",()=>{S.phase=el.dataset.phase;render();}));
  document.querySelectorAll("[data-step]").forEach(el=>el.addEventListener("click",()=>toggleStep(el.dataset.step)));
  document.querySelectorAll("[data-pct]").forEach(el=>el.addEventListener("input",()=>setPct(el.dataset.pct,el.value)));
  document.querySelectorAll("[data-note-open]").forEach(el=>el.addEventListener("click",()=>{
    S.editNote={...S.editNote,[el.dataset.noteOpen]:S.progress[el.dataset.noteOpen]?.note||""};render();
  }));
  document.querySelectorAll("[data-note-save]").forEach(el=>el.addEventListener("click",()=>{
    const inp=document.getElementById("note_"+el.dataset.noteSave);
    if(inp) S.editNote[el.dataset.noteSave]=inp.value;
    saveNote(el.dataset.noteSave);
  }));
  document.querySelectorAll("[data-note-close]").forEach(el=>el.addEventListener("click",()=>{
    delete S.editNote[el.dataset.noteClose];render();
  }));
  document.querySelectorAll("[data-next]").forEach(el=>el.addEventListener("change",()=>toggleNext(el.dataset.next)));
  document.querySelectorAll("[data-gantt]").forEach(el=>el.addEventListener("change",()=>toggleGantt(el.dataset.gantt)));
  document.querySelectorAll("[data-bud]").forEach(el=>el.addEventListener("input",()=>setBud(el.dataset.bud,el.value)));
  const ui=document.getElementById("upd_inp"),us=document.getElementById("upd_sel"),ub=document.getElementById("upd_btn");
  if(ui){ui.addEventListener("input",()=>S.newUpd=ui.value);ui.addEventListener("keydown",e=>{if(e.key==="Enter")addUpdate();});}
  if(us) us.addEventListener("change",()=>S.updType=us.value);
  if(ub) ub.addEventListener("click",addUpdate);
}

// ── START ─────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
